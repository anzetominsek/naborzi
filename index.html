<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>data.naborzi.si</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0ede8;
    --surface: #faf9f7;
    --border: #d8d4cc;
    --border-light: #e8e4dc;
    --text: #1a1916;
    --text-muted: #6b6860;
    --text-faint: #9e9b94;
    --accent: #2a5f3f;
    --accent-light: #e8f2ec;
    --folder-fill: #f5c842;
    --folder-shadow: #d4a820;
    --pdf-fill: #e8efe8;
    --pdf-border: #4a7c4a;
    --pdf-text: #2a5f3f;
    --md-fill: #e8eef5;
    --md-border: #4a6a8a;
    --md-text: #2a4a6a;
    --select-bg: #dde8ff;
    --select-border: #6688cc;
    --bar-h: 36px;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Title bar ── */
  .titlebar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    height: var(--bar-h);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    user-select: none;
  }
  .titlebar-logo {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .titlebar-sep { color: var(--border); }

  /* ── Address bar ── */
  .addressbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 4px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .nav-btn {
    width: 24px; height: 24px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--surface);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .nav-btn:hover { background: var(--bg); }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .nav-btn svg { width: 12px; height: 12px; }
  .address-field {
    flex: 1;
    height: 24px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: white;
    padding: 0 8px;
    font-size: 12px;
    color: var(--text);
    outline: none;
    font-family: inherit;
  }
  .address-field:focus { border-color: var(--select-border); }

  /* ── Main area ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 180px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 8px 0;
    overflow-y: auto;
  }
  .sidebar-section {
    padding: 4px 12px 2px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 6px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 12px;
    border-radius: 0;
  }
  .sidebar-item:hover { background: var(--bg); color: var(--text); }
  .sidebar-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
  .sidebar-item svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* ── File grid ── */
  .filezone {
    flex: 1;
    background: white;
    overflow-y: auto;
    padding: 12px;
    outline: none;
  }
  .filezone:focus { outline: 1px solid var(--select-border); outline-offset: -1px; }

  .file-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
    gap: 2px;
    align-content: start;
  }

  .file-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 4px 6px;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid transparent;
    user-select: none;
    position: relative;
  }
  .file-item:hover {
    background: #e8f0ff;
    border-color: #a0b8e8;
  }
  .file-item.selected {
    background: var(--select-bg);
    border-color: var(--select-border);
  }
  .file-item .icon { margin-bottom: 5px; }
  .file-item .name {
    font-size: 11px;
    color: var(--text);
    text-align: center;
    line-height: 1.3;
    word-break: break-word;
    max-width: 80px;
  }
  .file-item.selected .name { color: var(--text); }

  /* ── Status bar ── */
  .statusbar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0 12px;
    height: 22px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text-muted);
  }
  .status-sep { color: var(--border); }

  /* ── Loading / empty ── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 200px; color: var(--text-faint); font-size: 13px;
  }

  /* ── Context menu ── */
  .ctxmenu {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: 2px 4px 12px rgba(0,0,0,0.12);
    padding: 4px 0;
    min-width: 160px;
    z-index: 1000;
    font-size: 12px;
  }
  .ctxmenu-item {
    padding: 5px 16px;
    cursor: pointer;
    color: var(--text);
  }
  .ctxmenu-item:hover { background: var(--accent-light); color: var(--accent); }
  .ctxmenu-sep { height: 1px; background: var(--border-light); margin: 3px 0; }
  .ctxmenu-item.disabled { color: var(--text-faint); cursor: default; }
  .ctxmenu-item.disabled:hover { background: none; color: var(--text-faint); }
</style>
</head>
<body>

<div class="titlebar">
  <span class="titlebar-logo">data.naborzi.si</span>
  <span class="titlebar-sep">—</span>
  <span style="color:var(--text-muted);font-size:12px;">Letna poročila slovenskih podjetij</span>
</div>

<div class="addressbar">
  <button class="nav-btn" id="btn-back" disabled title="Nazaj" onclick="navigateBack()">
    <svg viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button class="nav-btn" id="btn-up" disabled title="Gor" onclick="navigateUp()">
    <svg viewBox="0 0 12 12" fill="none"><path d="M2 8L6 4l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <input class="address-field" id="address" readonly value="data.naborzi.si /" />
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">Hitre povezave</div>
    <div class="sidebar-item active" onclick="navigateRoot()">
      <svg viewBox="0 0 14 14" fill="none"><rect x="1" y="4" width="12" height="9" rx="1.5" fill="#f5c842" stroke="#d4a820" stroke-width="0.8"/><path d="M1 6h12" stroke="#d4a820" stroke-width="0.8"/><path d="M1 5.5l3-2.5h3" stroke="#d4a820" stroke-width="0.8" fill="none"/></svg>
      Vsa podjetja
    </div>
    <div class="sidebar-section" style="margin-top:12px">Sektorji</div>
    <div class="sidebar-item" onclick="filterSector('Energija')">
      <svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="var(--text-faint)" stroke-width="1"/><path d="M7 4v3l2 1.5" stroke="var(--text-faint)" stroke-width="1" stroke-linecap="round"/></svg>
      Energija
    </div>
    <div class="sidebar-item" onclick="filterSector('Finance')">
      <svg viewBox="0 0 14 14" fill="none"><rect x="1.5" y="3" width="11" height="8" rx="1" stroke="var(--text-faint)" stroke-width="1"/><path d="M4 7h6M4 9h4" stroke="var(--text-faint)" stroke-width="1" stroke-linecap="round"/></svg>
      Finance
    </div>
    <div class="sidebar-item" onclick="filterSector('Pharma')">
      <svg viewBox="0 0 14 14" fill="none"><path d="M4 7h6M7 4v6" stroke="var(--text-faint)" stroke-width="1.5" stroke-linecap="round"/><rect x="1.5" y="1.5" width="11" height="11" rx="2" stroke="var(--text-faint)" stroke-width="1"/></svg>
      Pharma
    </div>
    <div class="sidebar-item" onclick="filterSector('Zavarovalništvo')">
      <svg viewBox="0 0 14 14" fill="none"><path d="M7 2l4.5 2v4c0 2.5-4.5 4-4.5 4S2.5 10.5 2.5 8V4L7 2z" stroke="var(--text-faint)" stroke-width="1" fill="none"/></svg>
      Zavarovalništvo
    </div>
    <div class="sidebar-item" onclick="filterSector('Telekomunikacije')">
      <svg viewBox="0 0 14 14" fill="none"><path d="M3 11c0-4.4 3.6-8 8-8M5 11c0-3.3 2.7-6 6-6M7 11c0-2.2 1.8-4 4-4" stroke="var(--text-faint)" stroke-width="1" stroke-linecap="round" fill="none"/></svg>
      Telekomunikacije
    </div>
    <div class="sidebar-item" onclick="filterSector('Trgovina')">
      <svg viewBox="0 0 14 14" fill="none"><path d="M2 4h10l-1.5 6H3.5L2 4z" stroke="var(--text-faint)" stroke-width="1" fill="none"/><path d="M5 4l.5-2h3l.5 2" stroke="var(--text-faint)" stroke-width="1" stroke-linecap="round" fill="none"/></svg>
      Trgovina
    </div>
  </div>

  <div class="filezone" id="filezone" tabindex="0">
    <div class="file-grid" id="grid">
      <div class="loading">Nalaganje...</div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="status-count">—</span>
  <span class="status-sep">|</span>
  <span id="status-selected">Nič ni izbrano</span>
</div>

<div class="ctxmenu" id="ctxmenu" style="display:none"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────
// To add a company: add an entry to COMPANIES.
// To add files: add to the files array. type: 'pdf' or 'md'
// url: the actual path on your server, e.g. '/petrol/letno-porocilo-2024.pdf'

const COMPANIES = [
  {
    id: 'petrol', name: 'Petrol d.d.', ticker: 'PETG', sector: 'Energija',
    files: [
      { name: 'letno-porocilo-2024.pdf', type: 'pdf', url: '/petrol/letno-porocilo-2024.pdf' },

      { name: 'letno-porocilo-2023.md',  type: 'md',  url: '/petrol/letno-porocilo-2023.md' },
      { name: 'letno-porocilo-2022.pdf', type: 'pdf', url: '/petrol/letno-porocilo-2022.pdf' },
      { name: 'letno-porocilo-2022.md',  type: 'md',  url: '/petrol/letno-porocilo-2022.md' },
    ]
  },
  {
    id: 'nlb', name: 'NLB d.d.', ticker: 'NLBR', sector: 'Finance',
    files: [
      { name: 'letno-porocilo-2024.pdf', type: 'pdf', url: '/nlb/letno-porocilo-2024.pdf' },
      { name: 'letno-porocilo-2024.md',  type: 'md',  url: '/nlb/letno-porocilo-2024.md' },
      { name: 'letno-porocilo-2023.pdf', type: 'pdf', url: '/nlb/letno-porocilo-2023.pdf' },
      { name: 'letno-porocilo-2023.md',  type: 'md',  url: '/nlb/letno-porocilo-2023.md' },
    ]
  },
  {
    id: 'krka', name: 'Krka d.d.', ticker: 'KRKG', sector: 'Pharma',
    files: [
      { name: 'letno-porocilo-2024.pdf', type: 'pdf', url: '/krka/letno-porocilo-2024.pdf' },
      { name: 'letno-porocilo-2024.md',  type: 'md',  url: '/krka/letno-porocilo-2024.md' },
      { name: 'letno-porocilo-2023.pdf', type: 'pdf', url: '/krka/letno-porocilo-2023.pdf' },
      { name: 'letno-porocilo-2023.md',  type: 'md',  url: '/krka/letno-porocilo-2023.md' },
      { name: 'letno-porocilo-2022.pdf', type: 'pdf', url: '/krka/letno-porocilo-2022.pdf' },
      { name: 'letno-porocilo-2022.md',  type: 'md',  url: '/krka/letno-porocilo-2022.md' },
    ]
  },
  {
    id: 'telekom', name: 'Telekom Slovenije', ticker: 'TLSG', sector: 'Telekomunikacije',
    files: [
      { name: 'letno-porocilo-2024.pdf', type: 'pdf', url: '/telekom/letno-porocilo-2024.pdf' },
      { name: 'letno-porocilo-2024.md',  type: 'md',  url: '/telekom/letno-porocilo-2024.md' },
      { name: 'letno-porocilo-2023.pdf', type: 'pdf', url: '/telekom/letno-porocilo-2023.pdf' },
      { name: 'letno-porocilo-2023.md',  type: 'md',  url: '/telekom/letno-porocilo-2023.md' },
    ]
  },
  {
    id: 'triglav', name: 'Zavarovalnica Triglav', ticker: 'ZVTG', sector: 'Zavarovalništvo',
    files: [
      { name: 'letno-porocilo-2024.pdf', type: 'pdf', url: '/triglav/letno-porocilo-2024.pdf' },
      { name: 'letno-porocilo-2024.md',  type: 'md',  url: '/triglav/letno-porocilo-2024.md' },
      { name: 'letno-porocilo-2023.pdf', type: 'pdf', url: '/triglav/letno-porocilo-2023.pdf' },
      { name: 'letno-porocilo-2023.md',  type: 'md',  url: '/triglav/letno-porocilo-2023.md' },
    ]
  },
  {
    id: 'mercator', name: 'Mercator d.d.', ticker: 'MELR', sector: 'Trgovina',
    files: [
      { name: 'letno-porocilo-2024.pdf', type: 'pdf', url: '/mercator/letno-porocilo-2024.pdf' },
      { name: 'letno-porocilo-2024.md',  type: 'md',  url: '/mercator/letno-porocilo-2024.md' },
    ]
  },
  {
    id: 'sava', name: 'Sava Re d.d.', ticker: 'POSR', sector: 'Zavarovalništvo',
    files: [
      { name: 'letno-porocilo-2024.pdf', type: 'pdf', url: '/sava/letno-porocilo-2024.pdf' },
      { name: 'letno-porocilo-2024.md',  type: 'md',  url: '/sava/letno-porocilo-2024.md' },
      { name: 'letno-porocilo-2023.pdf', type: 'pdf', url: '/sava/letno-porocilo-2023.pdf' },
      { name: 'letno-porocilo-2023.md',  type: 'md',  url: '/sava/letno-porocilo-2023.md' },
    ]
  },
  {
    id: 'luka', name: 'Luka Koper d.d.', ticker: 'LKPG', sector: 'Infrastruktura',
    files: [
      { name: 'letno-porocilo-2024.pdf', type: 'pdf', url: '/luka/letno-porocilo-2024.pdf' },
      { name: 'letno-porocilo-2024.md',  type: 'md',  url: '/luka/letno-porocilo-2024.md' },
      { name: 'letno-porocilo-2023.pdf', type: 'pdf', url: '/luka/letno-porocilo-2023.pdf' },
      { name: 'letno-porocilo-2023.md',  type: 'md',  url: '/luka/letno-porocilo-2023.md' },
    ]
  },
];

// ── State ─────────────────────────────────────────────────────────────────
let state = { view: 'root', company: null, filter: null, selected: null, history: [] };

// ── SVG icons ─────────────────────────────────────────────────────────────
function folderSvg() {
  return `<svg width="52" height="44" viewBox="0 0 52 44" fill="none">
    <path d="M2 9c0-2.2 1.8-4 4-4h11l4 4h21c2.2 0 4 1.8 4 4v25c0 2.2-1.8 4-4 4H6c-2.2 0-4-1.8-4-4V9z" fill="#f5c842" stroke="#c8971a" stroke-width="0.8"/>
    <path d="M2 16h48v22c0 2.2-1.8 4-4 4H6c-2.2 0-4-1.8-4-4V16z" fill="#fad84a" stroke="#c8971a" stroke-width="0.8"/>
  </svg>`;
}

function pdfSvg() {
  return `<svg width="44" height="52" viewBox="0 0 44 52" fill="none">
    <path d="M4 2h24l12 12v34c0 2.2-1.8 4-4 4H4c-2.2 0-4-1.8-4-4V6c0-2.2 1.8-4 4-4z" fill="#e8f0e8" stroke="#4a7c4a" stroke-width="0.8"/>
    <path d="M28 2l12 12H28V2z" fill="#c8dcc8" stroke="#4a7c4a" stroke-width="0.8"/>
    <text x="22" y="36" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="700" fill="#2a5f3f" letter-spacing="0.5">PDF</text>
  </svg>`;
}

function mdSvg() {
  return `<svg width="44" height="52" viewBox="0 0 44 52" fill="none">
    <path d="M4 2h24l12 12v34c0 2.2-1.8 4-4 4H4c-2.2 0-4-1.8-4-4V6c0-2.2 1.8-4 4-4z" fill="#e8eef8" stroke="#4a6aaa" stroke-width="0.8"/>
    <path d="M28 2l12 12H28V2z" fill="#c8d4f0" stroke="#4a6aaa" stroke-width="0.8"/>
    <text x="22" y="34" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="9" font-weight="700" fill="#2a4a8a" letter-spacing="0.3">.MD</text>
    <text x="22" y="43" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" fill="#4a6aaa">AI</text>
  </svg>`;
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');
  const address = document.getElementById('address');
  const btnBack = document.getElementById('btn-back');
  const btnUp = document.getElementById('btn-up');

  btnBack.disabled = state.history.length === 0;
  btnUp.disabled = state.view === 'root';

  if (state.view === 'root') {
    address.value = 'data.naborzi.si /';
    let companies = COMPANIES;
    if (state.filter) companies = companies.filter(c => c.sector === state.filter);
    grid.innerHTML = companies.map(c => `
      <div class="file-item" id="item-${c.id}"
        onclick="selectItem('folder:${c.id}')"
        ondblclick="openCompany('${c.id}')">
        <div class="icon">${folderSvg()}</div>
        <span class="name">${c.name}</span>
      </div>
    `).join('');
    updateStatus(companies.length + ' map', null);
  } else {
    const company = COMPANIES.find(c => c.id === state.company);
    address.value = `data.naborzi.si / ${company.name} /`;
    grid.innerHTML = company.files.map((f, i) => `
      <div class="file-item" id="item-file-${i}"
        onclick="selectItem('file:${i}')"
        ondblclick="openFile('${f.url}', '${f.type}')">
        <div class="icon">${f.type === 'pdf' ? pdfSvg() : mdSvg()}</div>
        <span class="name">${f.name}</span>
      </div>
    `).join('');
    updateStatus(company.files.length + ' datotek', null);
  }
  state.selected = null;
}

function updateStatus(count, selected) {
  document.getElementById('status-count').textContent = count || '—';
  document.getElementById('status-selected').textContent = selected || 'Nič ni izbrano';
}

// ── Navigation ─────────────────────────────────────────────────────────────
function openCompany(id) {
  state.history.push({ view: state.view, company: state.company, filter: state.filter });
  state.view = 'folder';
  state.company = id;
  state.filter = null;
  // Update sidebar active
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.querySelector('.sidebar-item').classList.add('active');
  render();
}

function navigateRoot() {
  state.history.push({ view: state.view, company: state.company, filter: state.filter });
  state.view = 'root';
  state.company = null;
  state.filter = null;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.sidebar-item')[0].classList.add('active');
  render();
}

function navigateBack() {
  if (state.history.length === 0) return;
  const prev = state.history.pop();
  state.view = prev.view;
  state.company = prev.company;
  state.filter = prev.filter;
  render();
}

function navigateUp() {
  if (state.view === 'folder') {
    state.history.push({ view: state.view, company: state.company, filter: state.filter });
    state.view = 'root';
    state.company = null;
    render();
  }
}

function filterSector(sector) {
  state.history.push({ view: state.view, company: state.company, filter: state.filter });
  state.view = 'root';
  state.company = null;
  state.filter = sector;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  render();
}

// ── Selection ──────────────────────────────────────────────────────────────
function selectItem(key) {
  document.querySelectorAll('.file-item.selected').forEach(el => el.classList.remove('selected'));
  const [type, id] = key.split(':');
  let el;
  if (type === 'folder') el = document.getElementById('item-' + id);
  else el = document.getElementById('item-file-' + id);
  if (el) el.classList.add('selected');
  state.selected = key;

  if (type === 'folder') {
    const c = COMPANIES.find(c => c.id === id);
    updateStatus(null, c ? c.name + ' — ' + c.files.length + ' datotek' : null);
  } else {
    const company = COMPANIES.find(c => c.id === state.company);
    if (company) {
      const f = company.files[parseInt(id)];
      updateStatus(null, f ? f.name : null);
    }
  }
}

// ── Open file ──────────────────────────────────────────────────────────────
function openFile(url, type) {
  window.open(url, '_blank');
}

// ── Context menu ───────────────────────────────────────────────────────────
document.getElementById('filezone').addEventListener('contextmenu', function(e) {
  e.preventDefault();
  const item = e.target.closest('.file-item');
  const menu = document.getElementById('ctxmenu');
  let html = '';
  if (item && state.view === 'folder') {
    const idx = item.id.replace('item-file-', '');
    const company = COMPANIES.find(c => c.id === state.company);
    const f = company ? company.files[parseInt(idx)] : null;
    if (f) {
      html += `<div class="ctxmenu-item" onclick="openFile('${f.url}','${f.type}')">Odpri</div>`;
      html += `<div class="ctxmenu-item" onclick="downloadFile('${f.url}','${f.name}')">Prenesi</div>`;
      html += `<div class="ctxmenu-sep"></div>`;
      html += `<div class="ctxmenu-item" onclick="copyUrl('${f.url}')">Kopiraj URL</div>`;
    }
  } else if (item && state.view === 'root') {
    const id = item.id.replace('item-', '');
    html += `<div class="ctxmenu-item" onclick="openCompany('${id}')">Odpri</div>`;
  } else {
    html += `<div class="ctxmenu-item disabled">Nič ni izbrano</div>`;
  }
  menu.innerHTML = html;
  menu.style.display = 'block';
  menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - 120) + 'px';
});

document.addEventListener('click', () => {
  document.getElementById('ctxmenu').style.display = 'none';
});

function downloadFile(url, name) {
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
}

function copyUrl(url) {
  const full = location.origin + url;
  navigator.clipboard.writeText(full).catch(() => {});
}

// ── Keyboard ───────────────────────────────────────────────────────────────
document.getElementById('filezone').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && state.selected) {
    const [type, id] = state.selected.split(':');
    if (type === 'folder') openCompany(id);
    else {
      const company = COMPANIES.find(c => c.id === state.company);
      if (company) { const f = company.files[parseInt(id)]; if (f) openFile(f.url, f.type); }
    }
  }
  if (e.key === 'Backspace') navigateUp();
  if (e.altKey && e.key === 'ArrowLeft') navigateBack();
});

// ── Init ───────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
