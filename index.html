<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>data.naborzi.si</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f1;
    --surface: #fafaf8;
    --border: #e0ddd7;
    --border-light: #ece9e3;
    --text: #111110;
    --text-muted: #6b6860;
    --text-faint: #9e9b94;
    --accent: #111110;
    --accent-hover: #333;
    --accent-light: #f0efe9;
    --folder-fill: #f5c842;
    --folder-shadow: #d4a820;
    --pdf-fill: #e8f0e8;
    --pdf-border: #4a7c4a;
    --pdf-text: #2a5f3f;
    --md-fill: #e8eef5;
    --md-border: #4a6a8a;
    --md-text: #2a4a6a;
    --select-bg: #ececea;
    --select-border: #aaa9a5;
    --bar-h: 40px;
    --chrome-bg: #111110;
    --chrome-border: #2a2a28;
    --chrome-muted: #888784;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Title bar ── */
  .titlebar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    user-select: none;
  }
  .titlebar-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Address + Search bar ── */
  .addressbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .nav-btn {
    width: 30px; height: 30px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    flex-shrink: 0;
    transition: background 0.1s;
  }
  .nav-btn:hover { background: var(--bg); border-color: var(--border); }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .nav-btn svg { width: 13px; height: 13px; }
  .address-field {
    flex: 7;
    height: 30px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: white;
    padding: 0 12px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    outline: none;
    min-width: 0;
  }
  .address-field:focus { border-color: var(--text); }

  /* ── Search box ── */
  .search-wrap {
    position: relative;
    flex: 3;
    min-width: 0;
  }
  .search-input {
    height: 30px;
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: white;
    padding: 0 10px 0 32px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    box-sizing: border-box;
  }
  .search-input:focus { border-color: var(--text); }
  .search-input::placeholder { color: #aaa9a5; }
  .search-icon {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--text-faint);
  }
  .search-icon svg { width: 14px; height: 14px; display: block; }
  .search-input::placeholder { color: #aaa9a5; }
  .search-icon {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: #888;
  }
  .search-icon svg { width: 14px; height: 14px; display: block; }

  /* ── Search dropdown ── */
  .search-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    z-index: 500;
    max-height: 320px;
    overflow-y: auto;
    display: none;
  }
  .search-dropdown.visible { display: block; }
  .search-result {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-light);
    transition: background 0.1s;
  }
  .search-result:last-child { border-bottom: none; }
  .search-result:hover, .search-result.focused { background: var(--accent-light); }
  .search-result-icon { flex-shrink: 0; }
  .search-result-icon svg { width: 20px; height: 24px; }
  .search-result-info { flex: 1; min-width: 0; }
  .search-result-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .search-result-meta {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 1px;
  }
  .search-result-meta mark {
    background: none;
    color: var(--text);
    font-weight: 600;
  }
  .search-empty {
    padding: 16px 12px;
    font-size: 12px;
    color: var(--text-faint);
    text-align: center;
  }

  /* ── Main area ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── File grid ── */
  .filezone {
    flex: 1;
    background: white;
    overflow-y: auto;
    padding: 16px;
    outline: none;
  }
  .filezone:focus { outline: none; }

  /* ── Section headers (instead of sidebar categories) ── */
  .section-header {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 4px 0 10px;
    margin-top: 18px;
    border-bottom: 1px solid var(--border-light);
    margin-bottom: 10px;
    user-select: none;
  }
  .section-header:first-child { margin-top: 0; }

  .file-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
    gap: 2px;
    align-content: start;
    margin-bottom: 4px;
  }

  .file-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 4px 6px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid transparent;
    user-select: none;
    position: relative;
    transition: background 0.1s;
  }
  .file-item:hover {
    background: var(--accent-light);
    border-color: var(--border);
  }
  .file-item.selected {
    background: var(--select-bg);
    border-color: var(--select-border);
  }
  .file-item .icon { margin-bottom: 5px; }
  .file-item .name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    line-height: 1.3;
    word-break: break-word;
    max-width: 84px;
  }
  .file-item .ticker-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-faint);
    margin-top: 2px;
  }
  .file-item.selected .name { color: var(--text); }

  /* ── Status bar ── */
  .statusbar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    flex-shrink: 0;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .statusbar-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .status-sep { color: var(--border); }
  .statusbar a {
    color: var(--text-muted);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    transition: color 0.15s, border-color 0.15s;
  }
  .statusbar a:hover {
    color: var(--text);
    border-bottom-color: var(--text-muted);
  }
  .status-meta {
    color: var(--text-faint);
    font-size: 11px;
  }

  /* ── Loading / empty ── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 200px; color: var(--text-faint); font-size: 13px;
  }

  /* ── Context menu ── */
  .ctxmenu {
    position: fixed;
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    padding: 4px 0;
    min-width: 160px;
    z-index: 1000;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
  }
  .ctxmenu-item {
    padding: 6px 16px;
    cursor: pointer;
    color: var(--text);
    font-weight: 400;
  }
  .ctxmenu-item:hover { background: var(--accent-light); }
  .ctxmenu-sep { height: 1px; background: var(--border-light); margin: 3px 0; }
  .ctxmenu-item.disabled { color: var(--text-faint); cursor: default; }
  .ctxmenu-item.disabled:hover { background: none; }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="titlebar">
  <span class="titlebar-title">Arhiv letnih poročil</span>
</div>

<div class="addressbar">
  <button class="nav-btn" id="btn-back" disabled title="Nazaj" onclick="navigateBack()">
    <svg viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button class="nav-btn" id="btn-up" disabled title="Gor" onclick="navigateUp()">
    <svg viewBox="0 0 12 12" fill="none"><path d="M2 8L6 4l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <input class="address-field" id="address" readonly value="Domov" />

  <!-- Search -->
  <div class="search-wrap">
    <span class="search-icon">
      <svg viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    </span>
    <input class="search-input" id="search-input" type="text" placeholder="Iskanje podjetij in datotek…"
      autocomplete="off" oninput="onSearchInput(event)" onkeydown="onSearchKey(event)" onfocus="onSearchFocus()" onblur="onSearchBlur()" />
    <div class="search-dropdown" id="search-dropdown"></div>
  </div>
</div>

<div class="main">
  <div class="filezone" id="filezone" tabindex="0">
    <div id="grid-container">
      <div class="loading">Nalaganje...</div>
    </div>
  </div>
</div>

<div class="statusbar">
  <div class="statusbar-row">
    <span id="status-count">—</span>
    <span class="status-sep">|</span>
    <span id="status-selected">Nič ni izbrano</span>
  </div>
  <div class="statusbar-row status-meta">
    <span>Nazadnje posodobljeno: april 2026</span>
    <span class="status-sep">·</span>
    <span>Avtor: <a href="https://www.naborzi.si" target="_blank">www.naborzi.si</a></span>
    <span class="status-sep">·</span>
    <a href="https://forms.gle/Uk7mNQ3jgNQZ2dhK9" target="_blank">Kontakt</a>
  </div>
</div>

<div class="ctxmenu" id="ctxmenu" style="display:none"></div>

<script>
// ── Data — loaded from data.json ───────────────────────────────────────────
let COMPANIES = [];

// ── State ─────────────────────────────────────────────────────────────────
let state = { view: 'root', company: null, selected: null, history: [] };

// ── SVG icons ─────────────────────────────────────────────────────────────
function folderSvg(small = false) {
  const w = small ? 20 : 52, h = small ? 17 : 44;
  const scale = small ? 20/52 : 1;
  return `<svg width="${w}" height="${h}" viewBox="0 0 52 44" fill="none">
    <path d="M2 9c0-2.2 1.8-4 4-4h11l4 4h21c2.2 0 4 1.8 4 4v25c0 2.2-1.8 4-4 4H6c-2.2 0-4-1.8-4-4V9z" fill="#f5c842" stroke="#c8971a" stroke-width="0.8"/>
    <path d="M2 16h48v22c0 2.2-1.8 4-4 4H6c-2.2 0-4-1.8-4-4V16z" fill="#fad84a" stroke="#c8971a" stroke-width="0.8"/>
  </svg>`;
}

function pdfSvg(small = false) {
  const w = small ? 17 : 44, h = small ? 20 : 52;
  return `<svg width="${w}" height="${h}" viewBox="0 0 44 52" fill="none">
    <path d="M4 2h24l12 12v34c0 2.2-1.8 4-4 4H4c-2.2 0-4-1.8-4-4V6c0-2.2 1.8-4 4-4z" fill="#e8f0e8" stroke="#4a7c4a" stroke-width="0.8"/>
    <path d="M28 2l12 12H28V2z" fill="#c8dcc8" stroke="#4a7c4a" stroke-width="0.8"/>
    <text x="22" y="36" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#2a5f3f" letter-spacing="0.5">PDF</text>
  </svg>`;
}

function mdSvg(small = false) {
  const w = small ? 17 : 44, h = small ? 20 : 52;
  return `<svg width="${w}" height="${h}" viewBox="0 0 44 52" fill="none">
    <path d="M4 2h24l12 12v34c0 2.2-1.8 4-4 4H4c-2.2 0-4-1.8-4-4V6c0-2.2 1.8-4 4-4z" fill="#e8eef8" stroke="#4a6aaa" stroke-width="0.8"/>
    <path d="M28 2l12 12H28V2z" fill="#c8d4f0" stroke="#4a6aaa" stroke-width="0.8"/>
    <text x="22" y="34" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#2a4a8a" letter-spacing="0.3">.MD</text>
    <text x="22" y="43" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="#4a6aaa">AI</text>
  </svg>`;
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('grid-container');
  const address = document.getElementById('address');
  const btnBack = document.getElementById('btn-back');
  const btnUp = document.getElementById('btn-up');

  btnBack.disabled = state.history.length === 0;
  btnUp.disabled = state.view === 'root';

  if (state.view === 'root') {
    address.value = 'Domov';

    const sorted = [...COMPANIES].sort((a, b) => a.name.localeCompare(b.name, 'sl'));
    let html = `<div class="file-grid">`;
    sorted.forEach(c => {
      html += `
        <div class="file-item" id="item-${c.id}"
          onclick="selectItem('folder:${c.id}')"
          ondblclick="openCompany('${c.id}')">
          <div class="icon">${folderSvg()}</div>
          <span class="name">${c.name}</span>
          <span class="ticker-badge">${c.ticker || ''}${c.delisted ? ' · delistirano' : ''}</span>
        </div>`;
    });
    html += `</div>`;
    container.innerHTML = html;
    updateStatus(COMPANIES.length + ' map', null);
  } else {
    const company = COMPANIES.find(c => c.id === state.company);
    address.value = `Domov / ${company.name} /`;
    container.innerHTML = `
      <div class="file-grid" id="grid">
        ${company.files.map((f, i) => `
          <div class="file-item" id="item-file-${i}"
            onclick="selectItem('file:${i}')"
            ondblclick="openFile('${f.url}', '${f.type}')">
            <div class="icon">${f.type === 'pdf' ? pdfSvg() : mdSvg()}</div>
            <span class="name">${f.name}</span>
          </div>`).join('')}
      </div>`;
    updateStatus(company.files.length + ' datotek', null);
  }
  state.selected = null;
}

function updateStatus(count, selected) {
  document.getElementById('status-count').textContent = count || '—';
  document.getElementById('status-selected').textContent = selected || 'Nič ni izbrano';
}

// ── Navigation ─────────────────────────────────────────────────────────────
function openCompany(id) {
  state.history.push({ view: state.view, company: state.company });
  state.view = 'folder';
  state.company = id;
  render();
}

function navigateBack() {
  if (state.history.length === 0) return;
  const prev = state.history.pop();
  state.view = prev.view;
  state.company = prev.company;
  render();
}

function navigateUp() {
  if (state.view === 'folder') {
    state.history.push({ view: state.view, company: state.company });
    state.view = 'root';
    state.company = null;
    render();
  }
}

// ── Selection ──────────────────────────────────────────────────────────────
function selectItem(key) {
  document.querySelectorAll('.file-item.selected').forEach(el => el.classList.remove('selected'));
  const [type, id] = key.split(':');
  let el;
  if (type === 'folder') el = document.getElementById('item-' + id);
  else el = document.getElementById('item-file-' + id);
  if (el) el.classList.add('selected');
  state.selected = key;

  if (type === 'folder') {
    const c = COMPANIES.find(c => c.id === id);
    updateStatus(null, c ? c.name + ' — ' + c.files.length + ' datotek' : null);
  } else {
    const company = COMPANIES.find(c => c.id === state.company);
    if (company) {
      const f = company.files[parseInt(id)];
      updateStatus(null, f ? f.name : null);
    }
  }
}

// ── Open file ──────────────────────────────────────────────────────────────
function openFile(url, type) {
  window.open(url, '_blank');
}

// ── Search ─────────────────────────────────────────────────────────────────
let searchFocusedIdx = -1;

function buildSearchIndex() {
  const items = [];
  COMPANIES.forEach(c => {
    const meta = [c.ticker, c.delisted ? 'delistirano' : null].filter(Boolean).join(' · ');
    items.push({ type: 'company', id: c.id, name: c.name, ticker: c.ticker, meta });
    c.files.forEach(f => {
      items.push({ type: 'file', id: c.id, name: f.name, fileType: f.type, url: f.url, meta: c.name, company: c });
    });
  });
  return items;
}

const SEARCH_INDEX = buildSearchIndex();

function highlight(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + query.length) + '</mark>' + text.slice(idx + query.length);
}

function onSearchInput(e) {
  const q = e.target.value.trim();
  const dropdown = document.getElementById('search-dropdown');
  searchFocusedIdx = -1;

  if (!q) {
    dropdown.innerHTML = '';
    dropdown.classList.remove('visible');
    return;
  }

  const ql = q.toLowerCase();
  const results = SEARCH_INDEX.filter(item =>
    item.name.toLowerCase().includes(ql) ||
    (item.ticker && item.ticker.toLowerCase().includes(ql)) ||
    (item.sector && item.sector.toLowerCase().includes(ql)) ||
    (item.meta && item.meta.toLowerCase().includes(ql))
  ).slice(0, 12);

  if (results.length === 0) {
    dropdown.innerHTML = `<div class="search-empty">Ni rezultatov za "${q}"</div>`;
  } else {
    dropdown.innerHTML = results.map((r, i) => {
      const icon = r.type === 'company' ? folderSvg(true) : (r.fileType === 'pdf' ? pdfSvg(true) : mdSvg(true));
      const nameHl = highlight(r.name, q);
      return `<div class="search-result" data-idx="${i}" onmousedown="searchSelect(${i}, event)">
        <span class="search-result-icon">${icon}</span>
        <span class="search-result-info">
          <div class="search-result-name">${nameHl}</div>
          <div class="search-result-meta">${highlight(r.meta, q)}</div>
        </span>
      </div>`;
    }).join('');
    // store results for keyboard nav
    dropdown._results = results;
  }
  dropdown.classList.add('visible');
}

function searchSelect(idx, e) {
  if (e) e.preventDefault();
  const dropdown = document.getElementById('search-dropdown');
  const results = dropdown._results;
  if (!results || !results[idx]) return;
  const r = results[idx];
  document.getElementById('search-input').value = '';
  dropdown.classList.remove('visible');
  dropdown.innerHTML = '';

  if (r.type === 'company') {
    openCompany(r.id);
  } else {
    // Navigate to company then open file
    state.history.push({ view: state.view, company: state.company });
    state.view = 'folder';
    state.company = r.id;
    render();
    // Small delay to let render complete, then open
    setTimeout(() => openFile(r.url, r.fileType), 80);
  }
}

function onSearchKey(e) {
  const dropdown = document.getElementById('search-dropdown');
  if (!dropdown.classList.contains('visible')) return;
  const items = dropdown.querySelectorAll('.search-result');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    searchFocusedIdx = Math.min(searchFocusedIdx + 1, items.length - 1);
    updateSearchFocus(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    searchFocusedIdx = Math.max(searchFocusedIdx - 1, 0);
    updateSearchFocus(items);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (searchFocusedIdx >= 0) searchSelect(searchFocusedIdx, null);
    else if (items.length > 0) searchSelect(0, null);
  } else if (e.key === 'Escape') {
    dropdown.classList.remove('visible');
    document.getElementById('search-input').blur();
  }
}

function updateSearchFocus(items) {
  items.forEach((el, i) => {
    el.classList.toggle('focused', i === searchFocusedIdx);
  });
}

function onSearchFocus() {
  const q = document.getElementById('search-input').value.trim();
  if (q) document.getElementById('search-dropdown').classList.add('visible');
}

function onSearchBlur() {
  setTimeout(() => {
    document.getElementById('search-dropdown').classList.remove('visible');
  }, 150);
}

// ── Context menu ───────────────────────────────────────────────────────────
document.getElementById('filezone').addEventListener('contextmenu', function(e) {
  e.preventDefault();
  const item = e.target.closest('.file-item');
  const menu = document.getElementById('ctxmenu');
  let html = '';
  if (item && state.view === 'folder') {
    const idx = item.id.replace('item-file-', '');
    const company = COMPANIES.find(c => c.id === state.company);
    const f = company ? company.files[parseInt(idx)] : null;
    if (f) {
      html += `<div class="ctxmenu-item" onclick="openFile('${f.url}','${f.type}')">Odpri</div>`;
      html += `<div class="ctxmenu-item" onclick="downloadFile('${f.url}','${f.name}')">Prenesi</div>`;
      html += `<div class="ctxmenu-sep"></div>`;
      html += `<div class="ctxmenu-item" onclick="copyUrl('${f.url}')">Kopiraj URL</div>`;
    }
  } else if (item && state.view === 'root') {
    const id = item.id.replace('item-', '');
    html += `<div class="ctxmenu-item" onclick="openCompany('${id}')">Odpri</div>`;
  } else {
    html += `<div class="ctxmenu-item disabled">Nič ni izbrano</div>`;
  }
  menu.innerHTML = html;
  menu.style.display = 'block';
  menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - 120) + 'px';
});

document.addEventListener('click', () => {
  document.getElementById('ctxmenu').style.display = 'none';
});

function downloadFile(url, name) {
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
}

function copyUrl(url) {
  const full = location.origin + url;
  navigator.clipboard.writeText(full).catch(() => {});
}

// ── Keyboard ───────────────────────────────────────────────────────────────
document.getElementById('filezone').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && state.selected) {
    const [type, id] = state.selected.split(':');
    if (type === 'folder') openCompany(id);
    else {
      const company = COMPANIES.find(c => c.id === state.company);
      if (company) { const f = company.files[parseInt(id)]; if (f) openFile(f.url, f.type); }
    }
  }
  if (e.key === 'Backspace') navigateUp();
  if (e.altKey && e.key === 'ArrowLeft') navigateBack();
});

// ── Init — load index.json then render ────────────────────────────────────
fetch('index.json')
  .then(r => r.json())
  .then(data => {
    COMPANIES = data;
    render();
  })
  .catch(() => {
    document.getElementById('grid-container').innerHTML =
      '<div class="loading">Napaka pri nalaganju index.json</div>';
  });
</script>
</body>
</html>
